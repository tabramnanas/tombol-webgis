<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buka Dashboard</title>
    <style>
        /* Mengatur latar belakang agar menyatu dengan StoryMaps */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: transparent; 
        }
        /* Mengatur ukuran kotak gambar */
        .container { 
            position: relative; 
            width: 100%; 
            max-width: 1000px; 
            cursor: pointer; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .map-image { 
            width: 100%; 
            display: block; 
            transition: transform 0.3s; 
        }
        /* Membuat lapisan hitam transparan yang awalnya tersembunyi (opacity 0) */
        .overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.4); 
            opacity: 0; 
            transition: opacity 0.3s ease; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        /* Memunculkan lapisan dan sedikit membesarkan gambar saat disentuh kursor */
        .container:hover .overlay { opacity: 1; }
        .container:hover .map-image { transform: scale(1.02); }
        
        /* Desain tombol Buka Dashboard */
        .btn { 
            background-color: white; 
            color: black; 
            padding: 12px 24px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 30px; 
            border: 2px solid black; 
            font-family: sans-serif; 
            box-shadow: 3px 3px 0px black;
        }
    </style>
</head>
<body>

    <a href="https://experience.arcgis.com/experience/a182c5224f784054902f0c7ba4b16c1c/" target="_blank" class="container">
        
        <img src="tombol.png" alt="Peta Interaktif" class="map-image">
        
        <div class="overlay">
            <div class="btn">Buka Dashboard ↗</div>
        </div>
    </a>

</body>
</html>
